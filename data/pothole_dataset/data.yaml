# AyosBayan Dataset Configuration
# =================================
#
# This YAML file contains the dataset configuration for YOLOv8 training.
# It tells YOLO where to find the training, validation, and test images,
# and defines the classes the model should detect.
#
# Format: YOLOv8 dataset YAML (YAML format)
#
# Author: Federex (AyosBayan Research Project)
# Version: 1.0
# Last Updated: April 2026
#
# Usage:
#   This file is used by:
#   1. Training: python src/train.py --data data/pothole_dataset/data.yaml
#   2. Validation: The model validates on this data during training
#   3. Testing: After training, you can test on the test split
#
# Dataset Structure:
#   data/pothole_dataset/
#   ├── data.yaml           ← This file
#   ├── train/
#   │   ├── images/         ← Training images (70% of data)
#   │   └── labels/        ← Training labels (bounding boxes)
#   ├── val/
#   │   ├── images/        ← Validation images (20% of data)
#   │   └── labels/        ← Validation labels
#   └── test/
#       ├── images/        ← Test images (10% of data)
#       └── labels/        ← Test labels
#
# How to prepare your dataset:
#   1. Collect images of potholes and normal roads
#   2. Annotate potholes using a tool like Roboflow, LabelImg, or CVAT
#   3. Export in YOLO format (bounding boxes as .txt files)
#   4. Split into train/val/test folders
#   5. Update this data.yaml with your paths
#
# For more information, see the README_v2.md section on:
#   "1. Image Collection (Data Acquisition)"
#   "2. Data Processing (Preprocessing)"

# ============================================================================
# DATASET PATHS
# ============================================================================

# Path to the training images folder
# This is where YOLO looks for training images
# The path is relative to this data.yaml file
#
# Why this structure?
#   - YOLO expects a specific folder structure
#   - Images and labels are in separate folders
#   - The train/val/test split is in separate folders
train: train/images

# Path to the validation images folder
# After each training epoch, YOLO validates on these images
# This helps monitor for overfitting
#
# Validation is used to:
#   - Monitor training progress
#   - Select the best model (early stopping)
#   - Tune hyperparameters
val: val/images

# Path to the test images folder
# These images are NOT used during training
# They are held out for final evaluation only
#
# Why separate test from validation?
#   - Validation data influences model selection
#   - Test data gives unbiased final performance estimate
#   - More accurate representation of real-world performance
test: test/images


# ============================================================================
# CLASS CONFIGURATION
# ============================================================================

# Number of classes
# This is the number of different object types the model detects
# 
# For v1.0, we only detect potholes (1 class)
# Future versions may detect multiple classes:
#   - crack: Road cracks
#   - bump: Speed bumps
#   - manhole: Open manholes
#   - flood: Water flooding
nc: 1

# Class names
# This is a list of class names in the order they are indexed
# The index (0-based) is used in the label files
#
# Format: ['class_name_0', 'class_name_1', ...]
#
# For our pothole detection:
#   - Index 0: pothole
#
# The label files use these indices:
#   - Each line in a .txt file is: <class_index> <x_center> <y_center> <width> <height>
#   - Example: "0 0.5 0.5 0.3 0.2" means pothole at center
names:
  0: pothole


# ============================================================================
# ADDITIONAL CONFIGURATION (OPTIONAL)
# ============================================================================

# Dataset information (for documentation)
# This is optional but helps with organization
#
# You can add custom fields here that your code might use
# YOLO will ignore them, but your scripts can read them

# Dataset name
# Name of the dataset for reference
dataset_name: "AyosBayan Pothole Dataset"

# Version
# Dataset version for tracking
dataset_version: "1.0"

# Description
# Brief description of the dataset
description: |
  Pothole detection dataset for AyosBayan citizen infrastructure
  reporting system. Includes images from Philippine roads under
  various conditions (rain, different lighting, angles).

# Data sources
# Where the data came from (for reference)
sources:
  - "Roboflow Pothole Detection Dataset"
  - "RDD2022 (Road Damage Dataset)"
  - "Custom citizen data (anonymized)"

# Image specifications
# Expected image format
image_format:
  - "JPEG"
  - "PNG"

# Image size
# Input size for YOLOv8 training
input_size: 640

# Class distribution
# Approximate distribution of classes (for reference)
class_distribution:
  pothole: "70%"
  normal: "30%"
